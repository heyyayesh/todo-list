<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>Simple Todo List</header>

    <main>

        <div class="folders-list">
            <span class="folders-heading">My Folders</span>
            <ul>
                <li class="folder ">
                    Today
                </li>
                <li class="folder">
                    School
                </li>
                <li class="folder active">
                    Groceries
                </li>
                <li class="folder">
                    Workout
                </li>
            </ul>
            <div class="create folder">
                <form action="">
                    <input type="text" class="create-folder input" placeholder="Create New Folder">
                    <button class="create-folder-btn">+</button>  
                </form>    
            </div>
        </div>

        <div class="todos-list">

            <div class="top">
                <div class="header">
                    <span class="current-folder">Today</span>
                    <p class="todo-count">3 tasks pending</p>
                </div>
    
                <div class="main">
                    <ul>
                        <li>
                            <input type="checkbox" id="todo1">
                            <label class="done" for="todo1">Create folders to or</label>
                        </li>
                        <li>
                            <input type="checkbox" id="todo2">
                            <label for="todo2">Create folders to organize r todos pkajf 'pjsd pjppisd oiejrg  oerngojfn</label>
                        </li>
                        <li>
                            <input type="checkbox" id="todo3">
                            <label for="todo3">Create fol</label>
                        </li>
                        <li>
                            <input type="checkbox" id="todo4">
                            <label for="todo4">Create folders to organize your todos</label>
                        </li>
                    </ul>
    
                    <div class="create todo">
                        <form action="">
                            <input type="text" class="create-todo input" placeholder="Create New Task">
                            <button class="create-todo-btn">+</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="delete">
                <button class="delete tasks">Clear Completed Tasks</button>
                <button class="delete folder">Delete Folder</button>
            </div>
        </div>
    </main>

    <footer>
        Copyright © 2021 <a href="https://github.com/heyyayesh">@heyyayesh</a>
    </footer>
    <script src="main.js"></script>
</body>
</html>
